<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="/static/htmx.min.js"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.0.2/sse.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d1117; color: #c9d1d9; font: 14px monospace; line-height: 1.5; padding: 24px; max-width: 1000px; margin: auto; }
        h1 { color: #58a6ff; font-size: 20px; margin-bottom: 16px; }
        nav { display: flex; gap: 16px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #30363d; }
        nav a { color: #58a6ff; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; text-align: center; }
        .stat .value { font-size: 24px; font-weight: bold; color: #58a6ff; }
        .stat .label { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .run-row { display: grid; grid-template-columns: 2fr 1fr 80px 100px 80px; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid #30363d; font-size: 13px; }
        .cost { color: #3fb950; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .badge-running { background: #58a6ff; color: #fff; }
        .badge-completed { background: #3fb950; color: #000; }
        .badge-error { background: #f85149; color: #fff; }
        input[type="text"] { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; width: 100%; font: inherit; }
        button { background: #58a6ff; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font: inherit; }
        .live-log { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; min-height: 300px; max-height: 500px; overflow-y: auto; font-size: 13px; }
        .live-entry { padding: 4px 0; border-bottom: 1px solid #30363d; }
        .live-entry .ts { color: #8b949e; font-size: 11px; margin-right: 8px; }
        .tool { color: #d2991d; }
        .llm { color: #58a6ff; }
        .final { color: #3fb950; }
        .error { color: #f85149; }
    </style>
</head>
<body>
<h1>Looper Agent</h1>
<nav>
    <a href="/">Dashboard</a>
    <a href="/runs">Runs</a>
    <a href="/live">Live</a>
</nav>
{{block "content" .}}<!-- content goes here -->{{end}}
</body>
</html>
