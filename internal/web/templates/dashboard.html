{{template "base.html" .}}
{{define "content"}}
<div class="stats">
    <div class="stat"><div class="value">{{.Stats.TotalRuns}}</div><div class="label">Total Runs</div></div>
    <div class="stat"><div class="value cost">${{printf "%.4f" .Stats.TotalCost}}</div><div class="label">Total Cost</div></div>
    <div class="stat"><div class="value">{{.Stats.TotalTokens}}</div><div class="label">Tokens</div></div>
    <div class="stat"><div class="value">{{printf "%.1f" .Stats.AvgTurns}}</div><div class="label">Avg Turns</div></div>
</div>

<div class="card">
    <h2 style="font-size:16px;margin-bottom:12px;color:#8b949e;">Quick Run</h2>
    <form hx-post="/api/run" hx-target="#run-result" hx-swap="innerHTML" style="display:flex;gap:8px;">
        <input type="text" name="input" placeholder="Enter prompt..." required style="flex:1;">
        <button type="submit">Run</button>
    </form>
    <div id="run-result" style="margin-top:12px;"></div>
</div>

<div class="card">
    <h2 style="font-size:16px;margin-bottom:12px;color:#8b949e;">Recent Runs</h2>
    <div hx-get="/runs" hx-trigger="every 5s" hx-headers='{"HX-Request": "true"}'>
        {{template "runs_list.html" .}}
    </div>
</div>
{{end}}
