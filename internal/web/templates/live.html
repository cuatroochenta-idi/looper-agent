{{define "live_content"}}
<div class="card fade-in">
    <div class="section-title">Live Execution</div>
    <form hx-post="/api/run" hx-target="#live-result" hx-swap="innerHTML" class="inline-form">
        <input type="text" name="input" placeholder="Enter a prompt to watch the agent work in real-time..." required>
        <button type="submit">Run Live &rarr;</button>
    </form>
    <div id="live-result" style="margin-top:16px;"></div>
</div>
<div class="live-log fade-in" id="live-log">
    <div class="empty-state"><div class="icon">◉</div><p>Start a run to see the agent's thinking<br>in real-time with SSE streaming.</p></div>
</div>
{{end}}
